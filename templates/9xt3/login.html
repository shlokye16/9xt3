{% extends "base.html" %}
{% block title %}Login · Okie{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Login</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form action="/login" method="post">
      <input class="input" autofocus type="text" name="username" placeholder="Username" required/>
      <input class="input" type="password" name="password" placeholder="Password" required/>
      <button type="submit" class="btn" style="margin-top:4px;">Login</button>
    </form>
    <div class="auth-link">Don't have an account? <a href="/register">Register</a></div>
    <div class="auth-link"><a href="/forgot">Forgot password?</a></div>
  </div>
</div>
{% endblock %}
