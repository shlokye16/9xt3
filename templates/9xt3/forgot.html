{% extends "base.html" %}
{% block title %}Forgot Password · Okie{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Reset password</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form action="/forgot" method="post">
      <input class="input" autofocus type="email" name="email" placeholder="Your email address" required/>
      <button type="submit" class="btn" style="margin-top:4px;">Send reset code</button>
    </form>
    <div class="auth-link"><a href="/login">Back to login</a></div>
  </div>
</div>
{% endblock %}
