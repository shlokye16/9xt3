{% extends "base.html" %}
{% block title %}Register · Okie{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Register</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form action="/register" method="post">
      <input class="input" autofocus type="text" name="username" placeholder="Username" required/>
      <input class="input" type="email" name="email" placeholder="Email address" required/>
      <input class="input" type="password" name="password" placeholder="Password" required/>
      <input class="input" type="password" name="confirmation" placeholder="Confirm password" required/>
      <button type="submit" class="btn" style="margin-top:4px;">Register</button>
    </form>
    <div class="auth-link">Already have an account? <a href="/login">Login</a></div>
  </div>
</div>
{% endblock %}
